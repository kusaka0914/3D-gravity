# 敵パラメータ
# theta, u: 球面座標, currentPlanetNum: 惑星番号, hp: 体力
# model: モデルファイル名（省略時 enemy.obj）, scale: 描画スケール（省略時 0.25）
# speed: 移動速度（省略時 2.0）, attack: 接触時のダメージ（省略時 20.0）
# type: boss にするとボス（撃破でスター出現）
enemies:
  - type : normal
    hp: 80
    modelPath: enemy.obj
    scale: 0.25
    speed: 1.0
    attack: 5.0
    breakCountMax : 1
    radius : 0.75
  - type : boss
    hp: 200
    modelPath: enemy.obj
    scale: 1.0
    speed: 3.0
    attack: 10.0
    breakCountMax : 3
    radius : 1.5