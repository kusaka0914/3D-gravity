# 敵パラメータ
# theta, u: 球面座標, currentPlanetNum: 惑星番号, hp: 体力
# model: モデルファイル名（省略時 enemy.obj）, scale: 描画スケール（省略時 0.25）
# speed: 移動速度（省略時 2.0）, attack: 接触時のダメージ（省略時 20.0）
# type: boss にするとボス（撃破でスター出現）
enemies:
  - theta: 0.0
    u: 0.0
    height : 0.0
    currentPlanetNum: 0
    hp: 150
    modelPath: enemy.obj
    scale: 0.25
    speed: 1.5
    attack: 10.0
    radius : 0.75
