NPCs:
  - pos: [3.0, 7.5, -2.0]
    modelPath: spaceSlime.obj
    name: BoatPartsNPC
    talkTexts: [星を探している？残念だがこの惑星にはそんなものないぞ。,あー、確か近くの惑星にいいものを持っている\nでっかいやつがいるって噂を聞いたことあるな。,そこに行ってみたらどうだ？,隣の惑星に行くならそこらへんに落ちている\nパーツを拾ってロケットで行くんだな！]
  - pos: [-3.06, -3.69, 6.3]
    modelPath: spaceSlime.obj
    name: CrystalTutorialNPC
    talkTexts: [これはクリスタル！\nYまたはXで攻撃して壊せるよ！,中にアイテムが隠れてるかもしれないから\n見つけたらどんどん壊してね！]
  - pos: [7.14, -3.41, -0.08]
    modelPath: spaceSlime.obj
    name: BigCrystalTutorialNPC
    talkTexts: [大きなクリスタルは空中溜め攻撃で壊せるよ！,空中溜め攻撃はAでジャンプしてX長押し！\n溜まったらXを離して！]
  - pos: [-6.95, -3.7, 1.01]
    modelPath: spaceSlime.obj
    name: JumpDodgeTutorialNPC
    talkTexts: [遠い足場に乗りたい時はAでジャンプした後にBで回避！]
  - pos: [-1.35, 4.0, 6.8]
    modelPath: spaceSlime.obj
    name: JumpTutorialNPC
    talkTexts: [高い足場に乗りたい時はAでジャンプ！]
  - pos: [-3.62, 6.6, 2.51]
    modelPath: spaceSlime.obj
    name: WallTutorialNPC
    talkTexts: [緩やかな壁は歩けるんだよぉ〜楽しいねぇ〜]