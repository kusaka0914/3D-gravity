state:
  - id: battleTutorialText
    type: text
    pos: [20.0, 60.0]
    scaleRatio: [0.5, 1.0]
    text: 
    [
      "この惑星は敵が多そうですね...\nということで敵の倒し方を伝授します！",
      "戦闘の基本としては敵に近づいてYまたはXで攻撃します！",
      "Yは弱攻撃で攻撃力が低いですが、\n一定方向に連続して攻撃することができます！",
      "Xは強攻撃で攻撃力が高く、\n攻撃後の隙が大きいですが全方向に攻撃することができます！",
      "まずはY→Y→YまたはY→Y→Xのコンボを使って、\n敵に3回攻撃してみましょう！",
    ]

  - id: breakTutorialText
    type: text
    pos: [20.0, 60.0]
    scaleRatio: [0.5, 1.0]
    text: 
    [
      "3回攻撃できましたね！\n敵の頭上にあったガードがなくなったことに気づきましたか？",
      "というのも、敵に3回攻撃を当てると\nガードを1個破壊することができるのです！",
      "全てのガードを破壊することで\n敵を空中に打ち上げることができます！",
      "空中の敵を攻撃する時は空中溜め攻撃を使います！",
      "覚えてますか？\n大きなクリスタルを破壊するときに使うアレです！",
      "非常に強い技なのでガードを全破壊して空中溜め攻撃で\nサクサク敵を倒していきましょう！",
    ]
  - id: specialAttackTutorialText
    type: text
    pos: [20.0, 60.0]
    scaleRatio: [0.5, 1.0]
    text: 
    [
      "ちょっと失礼！左上の青いジュエル、\n何に使うんだろうとお困りではないですか？",
      "このジュエルは一定時間経過で生成されるもので、\n最大2個まで所持することができます。",
      "ジュエルを所持している時にLまたはRを押すことで、\nジュエルを1個消費して特殊な行動を行えます。",
      "Lを押すとスペシャル攻撃を繰り出し、\n全ての敵にダメージを与えてガードを1個破壊します。",
      "一方、Rを押すと自分の体力を1個回復させることができます。",
      "ジュエルは使っても時間経過により復活するので\nどんどん使っていくのをおすすめします。",
      "それではこれまで学んだことを活かして\n全ての敵を倒してみましょう！"
    ]
  
