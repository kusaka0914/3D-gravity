state:
  - id: battleTutorialText
    type: text
    pos: [20.0, 60.0]
    scaleRatio: [0.5, 1.0]
    text: 
    [
      "この惑星は敵が多そうですね...\nということで敵の倒し方を伝授します！",
      "まずそれぞれの敵はガードというものを持っています。",
      "連続して3回、敵に攻撃を当てることで\nガードを1つ破壊できます！",
      "全てのガードを破壊すると敵がブレイク状態になり、\n有利に戦闘を進められますよ！",
      "まずは1度ブレイクしてみましょう！",
    ]

  - id: breakTutorialText
    type: text
    pos: [20.0, 60.0]
    scaleRatio: [0.5, 1.0]
    text: 
    [
      "ナイスブレイク！\nブレイクすると敵が空中に打ち上げられます！",
      "空中の敵を攻撃するには空中溜め攻撃です！",
      "覚えてますか？\n大きなクリスタルを破壊するときに使うアレです！",
      "非常に強い技なのでブレイクして空中溜め攻撃で\nサクサク敵を倒していきましょう！",
    ]
  
  - id: stageClearText
    type: text
    pos: [0.0, 300.0]
    posRatio: [0.5, 0.0]
    scaleRatio: [1.0, 1.0]
    text: ["ステージクリア！"]

